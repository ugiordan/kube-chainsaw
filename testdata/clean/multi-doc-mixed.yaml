apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-doc-configmap
  namespace: default
data:
  key: value
---
apiVersion: v1
kind: Service
metadata:
  name: multi-doc-service
  namespace: default
spec:
  selector:
    app: test
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: multi-doc-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
