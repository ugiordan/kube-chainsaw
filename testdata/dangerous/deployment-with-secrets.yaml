apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader-sa
  namespace: production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-reader-role
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-reader-binding
subjects:
- kind: ServiceAccount
  name: secrets-reader-sa
  namespace: production
roleRef:
  kind: ClusterRole
  name: secrets-reader-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secrets-reader-deployment
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secrets-reader
  template:
    metadata:
      labels:
        app: secrets-reader
    spec:
      serviceAccountName: secrets-reader-sa
      containers:
      - name: app
        image: busybox
        command: ["sleep", "3600"]
