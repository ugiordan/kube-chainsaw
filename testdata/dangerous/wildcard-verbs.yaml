apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wildcard-verbs-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wildcard-verbs-binding
subjects:
- kind: ServiceAccount
  name: wildcard-verbs-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: wildcard-verbs-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wildcard-verbs-sa
  namespace: default
