apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: impersonate-verb-role
rules:
- apiGroups: [""]
  resources: ["users"]
  verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: impersonate-verb-binding
subjects:
- kind: ServiceAccount
  name: impersonate-verb-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: impersonate-verb-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: impersonate-verb-sa
  namespace: default
