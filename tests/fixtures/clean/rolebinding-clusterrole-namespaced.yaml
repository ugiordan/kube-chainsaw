apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rolebinding-clusterrole-namespaced-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rolebinding-clusterrole-namespaced-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: rolebinding-clusterrole-namespaced-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: rolebinding-clusterrole-namespaced-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rolebinding-clusterrole-namespaced-sa
  namespace: default
