apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: create-configmaps-role
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: create-configmaps-binding
subjects:
- kind: ServiceAccount
  name: create-configmaps-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: create-configmaps-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: create-configmaps-sa
  namespace: default
