apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: escalate-verb-role
rules:
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles"]
  verbs: ["escalate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: escalate-verb-binding
subjects:
- kind: ServiceAccount
  name: escalate-verb-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: escalate-verb-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: escalate-verb-sa
  namespace: default
