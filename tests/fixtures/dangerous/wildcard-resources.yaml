apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wildcard-resources-role
rules:
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wildcard-resources-binding
subjects:
- kind: ServiceAccount
  name: wildcard-resources-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: wildcard-resources-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wildcard-resources-sa
  namespace: default
