apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-cluster-wide-role
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-cluster-wide-binding
subjects:
- kind: ServiceAccount
  name: secrets-cluster-wide-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: secrets-cluster-wide-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-cluster-wide-sa
  namespace: default
