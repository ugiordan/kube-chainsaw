name: kube-chainsaw
description: Graph-level RBAC privilege chain analysis for Kubernetes manifests
inputs:
  paths:
    description: Space-separated directories to scan
    required: true
  fail-on:
    description: Minimum severity to fail (CRITICAL/HIGH/WARNING/INFO)
    default: CRITICAL
  format:
    description: Output format (console/json/sarif)
    default: console
  output:
    description: Output file path
    required: false
  version:
    description: kube-chainsaw version to install
    default: '0.1.0'
  suppressions:
    description: Path to suppressions YAML file
    required: false
runs:
  using: composite
  steps:
    - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
      with:
        python-version: '3.13'
    - shell: bash
      env:
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_SUPPRESSIONS: ${{ inputs.suppressions }}
      run: |
        pip install "kube-chainsaw==${INPUT_VERSION}"
        read -ra PATH_ARGS <<< "${INPUT_PATHS}"
        ARGS=()
        ARGS+=(--fail-on "${INPUT_FAIL_ON}")
        ARGS+=(--format "${INPUT_FORMAT}")
        if [ -n "${INPUT_OUTPUT}" ]; then
          ARGS+=(--output "${INPUT_OUTPUT}")
        fi
        if [ -n "${INPUT_SUPPRESSIONS}" ]; then
          ARGS+=(--suppressions "${INPUT_SUPPRESSIONS}")
        fi
        ARGS+=(--)
        ARGS+=("${PATH_ARGS[@]}")
        kube-chainsaw "${ARGS[@]}"
