version: 2

builds:
  - main: ./cmd/kube-chainsaw
    binary: kube-chainsaw
    ldflags:
      - -s -w
      - -X github.com/ugiordan/kube-chainsaw/internal/version.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - image_templates:
      - "ghcr.io/ugiordan/kube-chainsaw:{{ .Version }}"
      - "ghcr.io/ugiordan/kube-chainsaw:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/ugiordan/kube-chainsaw"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
